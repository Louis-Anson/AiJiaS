# Next Terminal — 数据库连接
# 连接主 PostgreSQL（AiJiaS 共享数据库），使用 host 网络模式直连
# 密码由 docker-compose 的 NT_DATABASE_URL 环境变量覆盖

Database:
  Enabled: true
  Type: postgres
  Postgres:
    Hostname: 127.0.0.1
    Port: 5432
    Username: next-terminal
    Password: next-terminal
    Database: next-terminal
  ShowSql: false

log:
  Level: debug
  Filename: ./logs/nt.log

Server:
  Addr: "0.0.0.0:8086"

App:
  Website:
    AccessLog: "./logs/access.log"
  Recording:
    Type: "local"
    Path: "/usr/local/next-terminal/data/recordings"
  Guacd:
    Drive: "/usr/local/next-terminal/data/drive"
    Hosts:
      - Hostname: 127.0.0.1
        Port: 4822
        Weight: 1
  ReverseProxy:
    Enabled: false                  # Traefik 已处理反向代理
    SelfProxyEnabled: false
    HttpEnabled: false
    HttpsEnabled: false
    IpExtractor: "x-forwarded-for"  # 从 Traefik 获取真实客户端 IP
