# Next Terminal — 内网跳板机 / Web SSH
# 使用主机网络，连接主 PostgreSQL，Traefik 通过 terminal.aijias.xyz 路由
# guacd 为 RDP/VNC 连接提供代理

services:
  guacd:
    image: dushixiang/guacd:latest
    container_name: guacd
    restart: always
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  next-terminal:
    image: dushixiang/next-terminal:latest
    container_name: next-terminal
    restart: always
    network_mode: host
    depends_on:
      - guacd
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /share/File/Container/next-terminal/data:/usr/local/next-terminal/data
      - /share/File/Container/next-terminal/logs:/usr/local/next-terminal/logs
      - /share/File/Container/next-terminal/next-terminal/config.yaml:/etc/next-terminal/config.yaml
