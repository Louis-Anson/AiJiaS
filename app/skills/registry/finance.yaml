# 家庭记账 — 通过 ezBookkeeping 记录收支
# ezBookkeeping MCP: add_transaction (按名称查找分类和账户，无需 ID)
# API: POST /api/v1/transactions/add.json
# 交易类型: expense=支出, income=收入, transfer=转账
# 金额、分类或账户低置信度时必须二次确认
id: finance.create_transaction
name: 家庭记账
service: ezbookkeeping
action: create_transaction
mcp_tool: add_transaction
description: 记录家庭收支，支持支出/收入/转账，自动关联账户和分类
risk: medium
input:
  type: "enum[expense, income, transfer]*"
  amount: "number*"
  description: "string*"
  date: "date [today]"
  category_name: string
  account_name: string
  notes: string
confirm: 涉及账本写入；金额、分类或账户不明确时必须确认
redlines:
  - 不允许批量删除或修改已确认账目
  - 金额 ≥ 5000 元必须确认
