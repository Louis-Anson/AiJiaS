# 照片备份与回忆 — 通过 Immich API 管理家庭照片
# Immich API: /api/albums, /api/assets
# 读取操作无需确认；删除或分享需确认

skills:
  - id: media.search_photos
    name: 照片搜索
    service: immich
    action: search_assets
    description: 按日期、人脸、地点搜索家庭照片
    risk: low
    input:
      query: "string*"
      start_date: date
      end_date: date
      person: string
      album: string
    confirm: false
    redlines:
      - 删除照片必须确认
      - 公开分享必须确认

  - id: media.play_music
    name: 音乐播放
    service: navidrome
    action: search_and_play
    description: 搜索家庭曲库并播放音乐
    risk: low
    input:
      query: "string*"
      artist: string
      album: string
      genre: string
    confirm: false
    redlines:
      - 下载/删除音乐文件需确认
