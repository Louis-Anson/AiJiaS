# ============================================================
# AiJiaS Core — 家庭 AI 经常控制的业务服务
# Hermes Agent 通过家庭管家 Profile 直接调 API 管理这些服务
# ============================================================

services:
  # ==================== 家务任务 ====================
  donetick:
    image: donetick/donetick:latest
    restart: unless-stopped
    ports:
      - "2021:2021"
    environment:
      - TZ=Asia/Shanghai
      - DT_ENV=selfhosted
      - DT_SQLITE_PATH=/donetick-data/donetick.db
      - DT_JWT_SECRET=${DT_JWT_SECRET}
    volumes:
      - /share/File/Container/donetick/data:/donetick-data

  # ==================== 菜谱与食材 ====================
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - TZ=Asia/Shanghai
      - ALLOW_SIGNUP=false
      - DB_ENGINE=postgres
      - POSTGRES_SERVER=192.168.3.195
      - POSTGRES_PORT=5432
      - POSTGRES_USER=mealie
      - POSTGRES_PASSWORD=${MEALIE_DB_PASSWORD}
      - POSTGRES_DB=mealie
    volumes:
      - /share/File/Container/mealie/data:/app/data

  # ==================== 物品管理 ====================
  homebox:
    image: sysadminsmedia/homebox:latest
    restart: unless-stopped
    ports:
      - "7745:7745"
    environment:
      - TZ=Asia/Shanghai
      - HBOX_LOG_LEVEL=info
      - HBOX_ALLOW_REGISTRATION=false
      - HBOX_AUTH_API_KEY_PEPPER=${HBOX_AUTH_API_KEY_PEPPER}
    volumes:
      - /share/File/Container/homebox/data:/data

  # ==================== 家庭记账 ====================
  # 并行阶段: Firefly (8088) + ezBookkeeping (7070) 同时运行
  # 迁移验证后: 注释掉 firefly 段，取消 ezbookkeeping 端口 8088 注释
  firefly:
    image: fireflyiii/core:latest
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      - TZ=Asia/Shanghai
      - APP_KEY=${FIREFLY_APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=192.168.3.195
      - DB_PORT=5432
      - DB_DATABASE=firefly
      - DB_USERNAME=firefly
      - DB_PASSWORD=${FIREFLY_DB_PASSWORD}
    volumes:
      - /share/File/Container/firefly/data:/var/www/html/storage/upload

  ezbookkeeping:
    image: mayswind/ezbookkeeping:latest
    restart: unless-stopped
    ports:
      - "7070:8080"           # 阶段1: 并行运行用 7070
      # - "8088:8080"         # 阶段2: 替换 Firefly 后改用 8088
    environment:
      - TZ=Asia/Shanghai
      - EBK_SERVER_ENABLE_GZIP=true
      - EBK_DATABASE_TYPE=postgres
      - EBK_DATABASE_HOST=192.168.3.195
      - EBK_DATABASE_PORT=5432
      - EBK_DATABASE_NAME=ezbookkeeping
      - EBK_DATABASE_USER=ezbookkeeping
      - EBK_DATABASE_PASSWD=${EZBOOKKEEPING_DB_PASSWORD}
      - EBK_SECURITY_SECRET_KEY=${EZBOOKKEEPING_SECRET_KEY}
      - EBK_USER_ENABLE_REGISTER=false
      - EBK_MCP_ENABLE_MCP=true
    volumes:
      - /share/File/Container/ezbookkeeping/data:/ezbookkeeping/data

  # ==================== 车辆保养 ====================
  lubelogger:
    image: ghcr.io/hargata/lubelogger:latest
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      - TZ=Asia/Shanghai
      - LUBELOGGER_DB_PROVIDER=postgresql
      - POSTGRES_HOST=192.168.3.195
      - POSTGRES_DATABASE=lubelogger
      - POSTGRES_USER=lubelogger
      - POSTGRES_PASSWORD=${LUBELOGGER_DB_PASSWORD}
    volumes:
      - /share/File/Container/lubelogger/data:/App/Data
      - /share/File/Container/lubelogger/keys:/root/.aspnet/DataProtection-Keys

  # ==================== 经期与健康预测（自建） ====================
  period-predictor:
    image: ${PERIOD_PREDICTOR_IMAGE:-aijias/period-predictor:latest}
    restart: unless-stopped
    profiles:
      - health
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /share/File/Container/period-predictor/models:/models
      - /share/File/Container/period-predictor/rules:/rules:ro
