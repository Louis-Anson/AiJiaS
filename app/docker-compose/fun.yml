# ============================================================
# AiJiaS Fun — 娱乐服务（AI 可偶尔访问，非核心业务）
# SillyTavern: AI 聊天前端  |  Navidrome: 音乐服务器
# go-music-dl / go-novel-dl: 下载工具
# ============================================================

services:
  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /share/File/Container/sillytavern/config:/home/node/app/config
      - /share/File/Container/sillytavern/data:/home/node/app/data
      - /share/File/Container/sillytavern/plugins:/home/node/app/plugins
      - /share/File/Container/sillytavern/extensions:/home/node/app/public/extensions
  go-music-dl:
    image: guohuiyuan/go-music-dl:latest
    restart: unless-stopped
    ports:
      - "8083:8080"
    command:
      - "./music-dl"
      - "web"
      - "--port=8080"
      - "--no-browser"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /share/Media/Container/go-music-dl/music:/app/downloads
      - /share/File/Container/go-music-dl/config:/app/config
  go-novel-dl:
    image: guohuiyuan/go-novel-dl:latest
    restart: unless-stopped
    ports:
      - "8084:8080"
    command:
      - "./novel-dl"
      - "web"
      - "--port=8080"
      - "--no-browser"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /share/Media/Container/go-novel-dl/novels:/app/downloads
      - /share/File/Container/go-novel-dl/config:/app/config
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      - TZ=Asia/Shanghai
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
    volumes:
      - /share/Media/Container/navidrome/data:/data
      - /share/Media/Container/go-music-dl/music:/music:ro
