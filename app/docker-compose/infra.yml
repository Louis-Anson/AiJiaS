# ============================================================
# AiJiaS Infra — 家庭基础服务（非 AI 业务，全屋共享）
# ntfy: 通知（为 Netdata/Hermes/mihomo 等推送消息）
# Vaultwarden: 密码库（家庭安全基础设施）
# ============================================================

services:
  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    ports:
      - "8082:80"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /File/Container/ntfy/cache:/var/cache/ntfy
      - /File/Container/ntfy/etc:/etc/ntfy
    networks:
      - home-public
    labels:
      - "traefik.enable=false"

  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SIGNUPS_ALLOWED=${VAU...ED}
      - SIGNUPS_VERIFY=false
      - ADMIN_TOKEN=***      - DOMAIN=https://vault.${DOMAIN_EXTERNAL}
      - DISABLE_ICON_DOWNLOAD=false
    volumes:
      - /share/Container/vaultwarden/data:/data
    networks:
      - home-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`vault.${DOMAIN_EXTERNAL}`)"
      - "traefik.http.routers.vault.entrypoints=websecure"
      - "traefik.http.routers.vault.tls=true"
      - "traefik.http.services.vault.loadbalancer.server.port=80"

networks:
  home-public:
    external: true
