version: "3.9"

services:
  # ==================== 音乐下载与搜刮 ====================
  go-music-dl:
    image: guohuiyuan/go-music-dl:latest
    container_name: go-music-dl
    restart: unless-stopped
    command:
      - "./music-dl"
      - "web"
      - "--port=8080"
      - "--no-browser"
      - "--vg-cover"
      - "--vg-audio"
      - "--vg-lyric"
      - "--vg-export"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /share/Container/go-music-dl/music:/app/downloads
      - /share/Container/go-music-dl/config:/app/config
    networks:
      - aijias-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.musicdl.rule=Host(`musicdl.${DOMAIN_EXTERNAL}`)"
      - "traefik.http.routers.musicdl.entrypoints=websecure"
      - "traefik.http.routers.musicdl.tls.certresolver=letsencrypt"
      - "traefik.http.services.musicdl.loadbalancer.server.port=8080"

  # ==================== 小说下载与搜刮 ====================
  go-novel-dl:
    image: guohuiyuan/go-novel-dl:latest
    container_name: go-novel-dl
    restart: unless-stopped
    command:
      - "./novel-dl"
      - "web"
      - "--port=8080"
      - "--no-browser"
      - "--export-txt"
      - "--export-epub"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /share/Container/go-novel-dl/novels:/app/downloads
      - /share/Container/go-novel-dl/config:/app/config
    networks:
      - aijias-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.noveldl.rule=Host(`novel.${DOMAIN_EXTERNAL}`)"
      - "traefik.http.routers.noveldl.entrypoints=websecure"
      - "traefik.http.routers.noveldl.tls.certresolver=letsencrypt"
      - "traefik.http.services.noveldl.loadbalancer.server.port=8080"

  # ==================== 私人音乐服务器 ====================
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
    volumes:
      - /share/Container/navidrome/data:/data
      - /share/Container/go-music-dl/music:/music:ro
    networks:
      - aijias-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.music.rule=Host(`music.${DOMAIN_EXTERNAL}`)"
      - "traefik.http.routers.music.entrypoints=websecure"
      - "traefik.http.routers.music.tls.certresolver=letsencrypt"
      - "traefik.http.services.music.loadbalancer.server.port=4533"
  # ==================== 照片备份管理 — Immich (对外暴露) ====================
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${IMMICH_DB_USER}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME}
      - REDIS_HOSTNAME=immich-redis
      - IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
    volumes:
      - /share/Container/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - immich-redis
      - immich-postgres
      - immich-machine-learning
    networks:
      - aijias-public
      - aijias-immich
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`immich.${DOMAIN_EXTERNAL}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls.certresolver=letsencrypt"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - immich_model_cache:/cache
    networks:
      - aijias-immich
    labels:
      - "traefik.enable=false"

  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    container_name: immich-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aijias-immich
    labels:
      - "traefik.enable=false"

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich-postgres
    shm_size: 128mb
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${IMMICH_DB_USER}
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=${IMMICH_DB_NAME}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /share/Container/immich/postgres:/var/lib/postgresql/data
    networks:
      - aijias-immich
    labels:
      - "traefik.enable=false"

volumes:
  immich_model_cache:
networks:
  aijias-public:
    external: true

  aijias-immich:
    external: true
    
