version: "3.9"

services:
  # ==================== 音乐下载与搜刮 ====================
  go-music-dl:
    image: guohuiyuan/go-music-dl:latest
    container_name: go-music-dl
    restart: unless-stopped
    command:
      - "./music-dl"
      - "web"
      - "--port=8080"
      - "--no-browser"
      - "--vg-cover"
      - "--vg-audio"
      - "--vg-lyric"
      - "--vg-export"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - music_data:/app/downloads
      - /share/Container/go-music-dl/config:/app/config
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 小说下载与搜刮 ====================
  go-novel-dl:
    image: guohuiyuan/go-novel-dl:latest
    container_name: go-novel-dl
    restart: unless-stopped
    command:
      - "./novel-dl"
      - "web"
      - "--port=8080"
      - "--no-browser"
      - "--export-txt"
      - "--export-epub"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - novel_data:/app/downloads
      - /share/Container/go-novel-dl/config:/app/config
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 私人音乐服务器 ====================
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
    volumes:
      - /share/Container/navidrome/data:/data
      - music_data:/music:ro
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  # ==================== 照片备份管理 — Immich (对外暴露) ====================
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${IMMICH_DB_USER}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME}
      - REDIS_HOSTNAME=immich-redis
      - IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
    volumes:
      - /share/Container/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - immich-redis
      - immich-postgres
      - immich-machine-learning
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`immich.${DOMAIN_EXTERNAL}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls.certresolver=letsencrypt"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - immich_model_cache:/cache
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  immich-redis:
    image: redis:8.6-alpine
    container_name: immich-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${IMMICH_DB_USER}
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=${IMMICH_DB_NAME}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /share/Container/immich/postgres:/var/lib/postgresql/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"

volumes:
  music_data:
  novel_data:
  immich_model_cache:

networks:
  traefik-public:
    external: true
