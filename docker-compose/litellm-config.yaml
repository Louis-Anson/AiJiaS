# ============================================================
# LiteLLM 模型路由配置
# 供应商：
#   1. DeepSeek 官方 API (直连)
#   2. 4SAPI 中转站 (提供 GPT / Claude / Gemini)
# ============================================================

model_list:
  # --- 日常对话：低成本、快速 ---
  - model_name: daily_zh
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  # --- 工具调用：严格遵循 schema ---
  - model_name: tool_strict
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      api_base: os.environ/OPENAI_API_BASE

  # --- 规划与总结：强逻辑 ---
  - model_name: planner
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/OPENAI_API_KEY
      api_base: os.environ/OPENAI_API_BASE

  # --- 深度推理：最强模型 ---
  - model_name: deep_reasoner
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      api_base: os.environ/OPENAI_API_BASE

  # --- 技能进化：离线批处理 ---
  - model_name: skill_evolver
    litellm_params:
      model: openai/gemini-2.0-flash
      api_key: os.environ/OPENAI_API_KEY
      api_base: os.environ/OPENAI_API_BASE

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  redis_host: redis
  redis_port: 6379
  redis_password: os.environ/REDIS_PASSWORD

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
