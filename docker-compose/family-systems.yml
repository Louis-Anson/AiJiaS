# ============================================================
# 家庭业务系统 — 全部内网访问 (relax.local)
# Donetick / Mealie / Homebox / Firefly III / LubeLogger
# 全部连接主 PostgreSQL (database.yml), 不再单独起 PG 容器
# ============================================================

services:
  # ==================== 家务任务 (SQLite) ====================
  donetick:
    image: donetick/donetick:beta
    container_name: donetick
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - DT_ENV=selfhosted
      - DT_SQLITE_PATH=/donetick-data/donetick.db
    volumes:
      - /share/Container/donetick/data:/donetick-data
    networks:
      - aijias-public
    labels:
      - "traefik.enable=false"

  # ==================== 菜谱管理 (主 PG) ====================
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - ALLOW_SIGNUP=false
      - BASE_URL=http://mealie.${DOMAIN_INTERNAL}
      - DB_ENGINE=postgres
      - POSTGRES_USER=mealie
      - POSTGRES_PASSWORD=${MEALIE_DB_PASSWORD}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mealie
    volumes:
      - /share/Container/mealie/data:/app/data
    depends_on:
      - postgres
    networks:
      - aijias-public
      - aijias-internal
    labels:
      - "traefik.enable=false"

  # ==================== 物品 / 衣物管理 (SQLite) ====================
  homebox:
    image: sysadminsmedia/homebox:latest
    container_name: homebox
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - HBOX_LOG_LEVEL=info
      - HBOX_ALLOW_REGISTRATION=false
    volumes:
      - /share/Container/homebox/data:/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - aijias-public
    labels:
      - "traefik.enable=false"

  # ==================== 家庭记账 Firefly III (主 PG) ====================
  firefly:
    image: fireflyiii/core:latest
    container_name: firefly
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - APP_KEY=${FIREFLY_APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=firefly
      - DB_USERNAME=firefly
      - DB_PASSWORD=${FIREFLY_DB_PASSWORD}
      - APP_URL=http://firefly.${DOMAIN_INTERNAL}
      - TRUSTED_PROXIES=**
    volumes:
      - /share/Container/firefly/data:/var/www/html/storage/upload
    depends_on:
      - postgres
    networks:
      - aijias-public
      - aijias-internal
    labels:
      - "traefik.enable=false"

  # ==================== 车辆保养 LubeLogger (主 PG) ====================
  lubelogger:
    image: ghcr.io/hargata/lubelogger:latest
    container_name: lubelogger
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_CONNECTION=Host=postgres:5432;Username=lubelogger;Password=${LUBELOGGER_DB_PASSWORD};Database=lubelogger;
    volumes:
      - /share/Container/lubelogger/data:/App/Data
      - /share/Container/lubelogger/keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      - postgres
    networks:
      - aijias-public
      - aijias-internal
    labels:
      - "traefik.enable=false"

networks:
  aijias-public:
      - aijias-internal
    external: true

  aijias-internal:
    external: true
