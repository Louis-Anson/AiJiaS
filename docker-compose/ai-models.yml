
services:
  # ============================================================
  # AI 模型服务 — 全部内网访问
  # period-predictor 女性健康预测 (profile: health)
  # ============================================================

  # ==================== 女性健康预测服务 ====================
  period-predictor:
    image: ${PERIOD_PREDICTOR_IMAGE:-aijias/period-predictor:latest}
    restart: unless-stopped
    profiles:
      - health
    environment:
      - TZ=Asia/Shanghai
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      - MODEL_DIR=/models
      - RULESET_DIR=/rules
    volumes:
      - /File/Container/period-predictor/models:/models
      - /File/Container/period-predictor/rules:/rules:ro
    networks:
      - aijias-public
    labels:
      - "traefik.enable=false"

networks:
  aijias-public:
    external: true

  aijias-internal:
    external: true
