version: "3.9"

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--providers.file.directory=/etc/traefik/dynamic"   # 新增：动态配置目录
      - "--providers.file.watch=true"                       # 新增：自动监听配置变更
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /share/Container/traefik/letsencrypt:/letsencrypt
      - /share/Container/traefik/dynamic:/etc/traefik/dynamic                    # 新增：挂载动态配置目录
    networks:
      - traefik-public

  traefik-manager:
    image: ghcr.io/chr0nzz/traefik-manager:latest
    container_name: traefik-manager
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      - TRAEFIK_API_URL=http://traefik:8080
      - CONFIG_DIR=/config
      - TZ=Asia/Shanghai
      # 管理员账号密码（admin / 请修改你的密码）
      - ADMIN_USER=louis
      - ADMIN_PASSWORD_HASH=$2y$10$XHxrPeSCmy6cj8sIybTGouGZ5L79FWQtstQtLqW5nOX7kwCZvty6u% 
    ports:
      - "8081:8081"
    volumes:
      - /share/Container/traefik/dynamic:/config
      - /share/Container/traefik/manager-db:/data
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true

  internal:
    external: true
