# ============================================================
# SillyTavern — AI 聊天前端 (对外暴露 chat.relax.mycloudnas.com)
# ============================================================

services:
  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:latest
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SILVERLEGACY_ALLOW_ORIGINS=*
      - SILVERLEGACY_LISTENING=true
      - SILVERLEGACY_PORT=8000
    volumes:
      - /File/Container/sillytavern/data:/home/node/app/data
      - /File/Container/sillytavern/config:/home/node/app/config
      - /File/Container/sillytavern/plugins:/home/node/app/plugins
      - /File/Container/sillytavern/extensions:/home/node/app/public/extensions
    networks:
      - aijias-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sillytavern.rule=Host(`chat.${DOMAIN_EXTERNAL}`)"
      - "traefik.http.routers.sillytavern.entrypoints=websecure"
      - "traefik.http.routers.sillytavern.tls=true"
      - "traefik.http.services.sillytavern.loadbalancer.server.port=8000"

networks:
  aijias-public:
    external: true

  aijias-internal:
    external: true
