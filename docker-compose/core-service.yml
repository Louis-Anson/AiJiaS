version: "3.9"

services:
  # ==================== 对外唯一 AI 入口 ====================
  ai-gateway:
    image: ${AI_GATEWAY_IMAGE:-aijias/ai-assistant-gateway:latest}
    container_name: aijias-ai-gateway
    restart: unless-stopped
    profiles:
      - gateway
    environment:
      - TZ=Asia/Shanghai
      - PUBLIC_BASE_URL=https://${AI_GATEWAY_HOST}
      - POSTGRES_DSN=postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${AIJIAS_DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - HERMES_BASE_URL=http://hermes-agent:3000
      - SKILL_REGISTRY_URL=http://skill-registry:8080
      - SERVICE_ADAPTER_URL=http://service-adapter:8080
      - NTFY_BASE_URL=http://ntfy:80
      - WECOM_CORP_ID=${WECOM_CORP_ID}
      - WECOM_AGENT_ID=${WECOM_AGENT_ID}
      - WECOM_TOKEN=${WECOM_TOKEN}
      - WECOM_AES_KEY=${WECOM_AES_KEY}
    depends_on:
      - service-adapter
      - pgbouncer
      - redis
      - ntfy
    networks:
      - traefik-public
      - aijias-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aijias-gateway.rule=Host(`${AI_GATEWAY_HOST}`)"
      - "traefik.http.routers.aijias-gateway.entrypoints=websecure"
      - "traefik.http.routers.aijias-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.aijias-gateway.loadbalancer.server.port=8080"

  # ==================== Hermes 主 Agent ====================
  hermes-agent:
    image: ${HERMES_IMAGE:-aijias/hermes-runtime:latest}
    container_name: hermes-agent
    restart: unless-stopped
    profiles:
      - agent
    environment:
      - TZ=Asia/Shanghai
      - PORT=3000
      - LLM_API_BASE=http://litellm:4000/v1
      - LLM_API_KEY=${LITELLM_MASTER_KEY}
      - SKILL_REGISTRY_URL=http://skill-registry:8080
      - SERVICE_ADAPTER_URL=http://service-adapter:8080
      - MEMORY_DSN=postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${AIJIAS_DB_NAME}
    volumes:
      - ../skills:/app/skills:ro
      - /docker/hermes/data:/app/data
      - /docker/hermes/config:/app/config
    depends_on:
      - litellm
      - service-adapter
      - pgbouncer
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  # ==================== 多模型中继 ====================
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - TZ=Asia/Shanghai
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${AIJIAS_DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    depends_on:
      - postgres
      - redis
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  # ==================== Skills 核心能力 ====================
  skill-registry:
    image: ${SKILL_REGISTRY_IMAGE:-aijias/skill-registry:latest}
    container_name: skill-registry
    restart: unless-stopped
    profiles:
      - skills
    environment:
      - TZ=Asia/Shanghai
      - PORT=8080
      - REGISTRY_PATH=/skills/registry
      - PENDING_PATH=/skills/pending
      - POSTGRES_DSN=postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${AIJIAS_DB_NAME}
    volumes:
      - ../skills:/skills
    depends_on:
      - pgbouncer
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  service-adapter:
    image: ${SERVICE_ADAPTER_IMAGE:-aijias/service-adapter:latest}
    container_name: service-adapter
    restart: unless-stopped
    profiles:
      - gateway
      - agent
    environment:
      - TZ=Asia/Shanghai
      - PORT=8080
      - DONETICK_BASE_URL=http://donetick:2021
      - GROCY_BASE_URL=http://grocy:80
      - MEALIE_BASE_URL=http://mealie:9000
      - TANDOOR_BASE_URL=http://tandoor:8080
      - EZBOOKKEEPING_BASE_URL=http://ezbookkeeping:8080
      - HOMEBOX_BASE_URL=http://homebox:7745
      - IMMICH_BASE_URL=http://immich-server:2283
      - NAVIDROME_BASE_URL=http://navidrome:4533
      - PERIOD_PREDICTOR_BASE_URL=http://period-predictor:5000
      - HOME_ASSISTANT_URL=${HOME_ASSISTANT_URL}
      - HA_LONG_LIVED_ACCESS_TOKEN=${HA_LONG_LIVED_ACCESS_TOKEN}
      - DONETICK_API_KEY=${DONETICK_API_KEY}
      - GROCY_API_KEY=${GROCY_API_KEY}
      - EZBOOKKEEPING_TOKEN=${EZBOOKKEEPING_TOKEN}
      - HOMEBOX_TOKEN=${HOMEBOX_TOKEN}
      - IMMICH_API_KEY=${IMMICH_API_KEY}
      - NAVIDROME_USERNAME=${NAVIDROME_USERNAME}
      - NAVIDROME_PASSWORD=${NAVIDROME_PASSWORD}
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  skill-miner:
    image: ${SKILL_MINER_IMAGE:-aijias/skill-miner:latest}
    container_name: skill-miner
    restart: unless-stopped
    profiles:
      - skills
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_DSN=postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${AIJIAS_DB_NAME}
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}
      - SKILL_REGISTRY_URL=http://skill-registry:8080
      - PENDING_PATH=/skills/pending
    volumes:
      - ../skills:/skills
    depends_on:
      - litellm
      - skill-registry
      - pgbouncer
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  # ==================== 通知与数据底座 ====================
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /docker/ntfy/cache:/var/cache/ntfy
      - /docker/ntfy/etc:/etc/ntfy
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${AIJIAS_DB_NAME}
      - TZ=Asia/Shanghai
    volumes:
      - /docker/postgres/data:/var/lib/postgresql/data
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    restart: unless-stopped
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_NAME=${AIJIAS_DB_NAME}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
    depends_on:
      - postgres
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /docker/redis/data:/data
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles:
      - local-llm
    volumes:
      - /docker/ollama:/root/.ollama
    networks:
      - aijias-internal
    labels:
      - "traefik.enable=false"

networks:
  traefik-public:
    external: true
  aijias-internal:
    external: true
