# LiteLLM — 大模型 API 路由，公网可访问（带鉴权）
http:
  routers:
    llm:
      rule: "Host(`llm.aijias.xyz`)"
      entrypoints: websecure
      tls: true
      service: litellm

    llm-api:
      rule: "Host(`llm.aijias.xyz`) && PathPrefix(`/v1`)"
      entrypoints: websecure
      tls: true
      service: litellm

  services:
    litellm:
      loadBalancer:
        servers:
          - url: "http://192.168.3.195:4000"
