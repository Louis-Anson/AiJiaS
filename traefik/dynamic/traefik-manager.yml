# Traefik Manager — 通过 Traefik 代理访问
http:
  routers:
    traefik-mgr:
      rule: "Host(`traefik-mgr.aijias.xyz`)"
      entrypoints: websecure
      tls: true
      service: traefik-manager

  services:
    traefik-manager:
      loadBalancer:
        servers:
          - url: "http://traefik-manager:5000"
