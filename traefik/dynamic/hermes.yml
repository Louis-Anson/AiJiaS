# Traefik 路由 — Hermes Agent（LXD 容器）
http:
  routers:
    hermes:
      rule: "Host(`hermes.aijias.xyz`)"
      entrypoints: websecure
      tls: true
      service: hermes-agent

    hermes-ui:
      rule: "Host(`hermes-ui.aijias.local`)"
      entrypoints: websecure
      tls: true
      service: hermes-dashboard

  services:
    hermes-agent:
      loadBalancer:
        servers:
          - url: "http://{{ env "HERMES_IP" }}:3000"

    hermes-dashboard:
      loadBalancer:
        servers:
          - url: "http://{{ env "HERMES_IP" }}:9119"
