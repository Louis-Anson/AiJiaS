# Traefik 动态路由 — Hermes + Next Terminal
# 复制到 /share/File/Container/traefik/dynamic/

http:
  routers:
    hermes:
      rule: "Host(`hermes.aijias.xyz`)"
      entrypoints: websecure
      tls: true
      service: hermes-agent

    hermes-ui:
      rule: "Host(`hermes-ui.aijias.local`)"
      entrypoints: websecure
      tls: true
      service: hermes-dashboard

      loadBalancer:
        servers:
          - url: "http://192.168.3.195:8088"
