# ============================================================
# Traefik — 全屋反向代理
# Let's Encrypt 通过阿里云 DNS Challenge 自动签发 + 续期
# ============================================================

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    environment:
      - HERMES_IP=${HERMES_IP}
      - ALIBABA_ACCESS_KEY_ID=${ALIBABA_ACCESS_KEY_ID}
      - ALIBABA_ACCESS_KEY_SECRET=${ALIBABA_ACCESS_KEY_SECRET}
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=home-public"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=alidns"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /share/File/Container/traefik/dynamic:/etc/traefik/dynamic
      - /share/Container/traefik/letsencrypt:/letsencrypt
    networks:
      - home-public

  traefik-manager:
    image: ghcr.io/chr0nzz/traefik-manager:latest
    container_name: traefik-manager
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      - TRAEFIK_API_URL=http://traefik:8080
      - CONFIG_DIR=/config
      - TZ=Asia/Shanghai
      - ADMIN_USER=louis
      - ADMIN_PASSWORD_HASH=${TRAEFIK_MANAGER_PASSWORD_HASH}
    volumes:
      - /share/File/Container/traefik/dynamic:/config
      - /share/File/Container/traefik/manager-db:/data
      - /share/File/Container/traefik/manager-config:/app/config
    networks:
      - home-public

networks:
  home-public:
    name: home-public
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1
