# ============================================================
# Nginx Proxy Manager — 全屋反向代理（备选方案）
# Web UI: http://192.168.3.195:8181
# 默认账号: admin@example.com / changeme
# ============================================================
#
# 切换步骤:
#   1. docker compose -p traefik down    # 停 Traefik
#   2. docker compose -p npm up -d       # 启 NPM
#   3. 浏览器打开 http://192.168.3.195:8181
#   4. 在 Web UI 中创建 Proxy Host（见 README.md）
#
# SSL 证书:
#   - 方案 A: NPM Web UI 内置 Let's Encrypt（HTTP Challenge 需公网 80 可达）
#   - 方案 B: 外部 acme.sh + DNS Challenge（推荐，见 scripts/acme-ssl.sh）
# ============================================================

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"        # HTTP（与 Traefik 相同端口，停 Traefik 后无缝接管）
      - "8443:443"     # HTTPS
      - "8181:81"      # NPM Admin Web UI
    environment:
      - TZ=Asia/Shanghai
      - DISABLE_IPV6=true
    volumes:
      - /share/Container/npm/data:/data
      - /share/Container/npm/letsencrypt:/etc/letsencrypt
      - /share/Container/npm/certs:/certs:ro   # 外部 acme.sh 证书挂载（可选）
    networks:
      - home-public

networks:
  home-public:
    name: home-public
    external: true
