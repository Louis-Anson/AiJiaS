<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">AiJiaS 家庭 AI 管家整体架构图</title>
  <desc id="desc">展示企业微信、小程序、Traefik、AI Assistant Gateway、Hermes、LiteLLM、Skill Registry、Service Adapter、家庭服务、Home Assistant、健康数据和数据库之间的关系。</desc>
  <defs>
    <!-- Beautiful Warm Cozy Gradient: Soft Peach Cream to Warm Latte -->
    <linearGradient id="warmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbfc"/>
      <stop offset="60%" stop-color="#faf2ea"/>
      <stop offset="100%" stop-color="#f6e6dc"/>
    </linearGradient>
    <linearGradient id="brainGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffafd"/>
      <stop offset="100%" stop-color="#f5eefa"/>
    </linearGradient>
    <!-- Soft, puffy shadows for a gentle, warm feeling -->
    <filter id="cozyShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="15" flood-color="#805d52" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#73523f" flood-opacity="0.06"/>
    </filter>
    <marker id="beautyArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#c49a88"/>
    </marker>
    <style>
      .main-title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 34px; font-weight: 800; fill: #5c4033; letter-spacing: -0.5px; }
      .description { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; fill: #8a7060; }
      .layer-title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; font-weight: 700; fill: #8c6a5c; letter-spacing: 1px; }
      .box-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; font-weight: 700; fill: #4a3728; }
      .box-desc { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; fill: #806b5c; }
      .tiny-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 11px; fill: #a28a7e; }
      .pill-text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 11px; font-weight: 700; fill: #fff; }
      .footer-text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #8a7b6e; font-style: italic; }
      
      /* Pure crisp vertical/horizontal bus flows. No messy intersections! */
      .bus-line { fill: none; stroke: #d9c5b2; stroke-width: 2.2; }
      .flow-line { fill: none; stroke: #d9c5b2; stroke-width: 2.2; marker-end: url(#beautyArrow); }
      .flow-dashed { fill: none; stroke: #e0b094; stroke-width: 1.8; stroke-dasharray: 6 6; marker-end: url(#beautyArrow); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1100" fill="url(#warmBg)"/>

  <!-- Top Decorative Frame -->
  <rect x="30" y="30" width="1540" height="1040" rx="36" fill="none" stroke="#ebdccb" stroke-width="1.5" stroke-dasharray="8 8"/>

  <!-- Header Section -->
  <g transform="translate(80, 85)">
    <text x="0" y="0" class="main-title">🏠 AiJiaS 家庭 AI 管家整体设计 (家物OS)</text>
    <text x="0" y="36" class="description">微信里的一句日常闲谈，经由专属 Gateway 安全验证、Hermes 温暖而严谨的 AI 主脑思考，调遣 Skill 执行，无缝落在各家庭微系统里。</text>
  </g>

  <!-- ==================== LAYER 1: TOUCHPOINTS ==================== -->
  <g transform="translate(0, 160)">
    <rect x="80" y="0" width="1440" height="115" rx="20" fill="#fffcf9" stroke="#f0e5de" stroke-width="1.2" filter="url(#softShadow)"/>
    <text x="110" y="-12" class="layer-title">TOUCHPOINTS · 随时呼唤的日常入口</text>

    <!-- WeCom -->
    <rect x="200" y="22" width="280" height="70" rx="16" fill="#fff5f5" stroke="#fecdd3" stroke-width="1.5" filter="url(#cozyShadow)"/>
    <text x="225" y="49" class="box-label">💬 企业微信 / 微信</text>
    <text x="225" y="69" class="box-desc">发送日常闲话、待办与记账指令</text>

    <!-- Mini Program -->
    <rect x="660" y="22" width="280" height="70" rx="16" fill="#fff5f5" stroke="#fecdd3" stroke-width="1.5" filter="url(#cozyShadow)"/>
    <text x="685" y="49" class="box-label">📱 微信小程序</text>
    <text x="685" y="69" class="box-desc">直观的列表看板、数据卡片展示</text>

    <!-- Web Portal -->
    <rect x="1120" y="22" width="280" height="70" rx="16" fill="#fff5f5" stroke="#fecdd3" stroke-width="1.5" filter="url(#cozyShadow)"/>
    <text x="1145" y="49" class="box-label">🖥️ 网页端管理后台</text>
    <text x="1145" y="69" class="box-desc">家庭复杂设置与长期图表盘点</text>
  </g>

  <!-- ==================== LAYER 1.5: THE WALL ==================== -->
  <g transform="translate(0, 315)">
    <!-- Traefik -->
    <rect x="420" y="0" width="260" height="80" rx="18" fill="#fdfcf7" stroke="#ebdccb" stroke-width="1.5" filter="url(#cozyShadow)"/>
    <text x="445" y="34" class="box-label">🔒 Traefik 反向代理</text>
    <text x="445" y="56" class="box-desc">网络出口与安全 TLS 加密防护</text>

    <!-- Safe Gateway -->
    <rect x="920" y="0" width="260" height="80" rx="18" fill="#fffbeb" stroke="#fed7aa" stroke-width="1.5" filter="url(#cozyShadow)"/>
    <text x="945" y="34" class="box-label">🛡️ AI Assistant Gateway</text>
    <text x="945" y="56" class="box-desc">成员身份识别与敏感操作安全确认</text>
  </g>

  <!-- ==================== LAYER 2: SYSTEM BRAIN & SKILL ==================== -->
  <g transform="translate(80, 445)">
    <rect x="0" y="0" width="1440" height="210" rx="24" fill="url(#brainGlow)" stroke="#ebd6f7" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="25" y="-12" class="layer-title">家庭 AI 核心 · 思考与进化的温室</text>

    <!-- Hermes Agent -->
    <rect x="50" y="35" width="340" height="140" rx="18" fill="#ffffff" stroke="#c084fc" stroke-width="2" filter="url(#cozyShadow)"/>
    <text x="80" y="68" class="box-label">🧠 Hermes AI 管家 (主脑)</text>
    <text x="80" y="93" class="box-desc">主导日常对话，维护长期记忆与上下文</text>
    <text x="80" y="115" class="box-desc">理解家的偏好、习惯与温暖默契</text>
    <text x="80" y="138" class="box-desc" fill="#9333ea" style="font-weight: 700;">🌱 核心大脑：理解指令 -> 规划技能</text>

    <!-- Skill Registry -->
    <rect x="550" y="35" width="340" height="140" rx="18" fill="#ffffff" stroke="#fbbf24" stroke-width="2" filter="url(#cozyShadow)"/>
    <text x="580" y="68" class="box-label">🧩 家庭技能登记册 (Skills)</text>
    <text x="580" y="93" class="box-desc">注册合法操作、入参 Schema 与确认策略</text>
    <text x="580" y="115" class="box-desc">避免大模型直接碰触核心财务和设备</text>
    <text x="580" y="138" class="box-desc" fill="#d97706" style="font-weight: 700;">⚖️ 安全红线：限制模型随意扩权</text>

    <!-- LiteLLM Routing -->
    <rect x="1050" y="35" width="340" height="140" rx="18" fill="#ffffff" stroke="#38bdf8" stroke-width="2" filter="url(#cozyShadow)"/>
    <text x="1080" y="68" class="box-label">⚡ LiteLLM 动态中继</text>
    <text x="1080" y="93" class="box-desc">统一封装、调度外部与本地大脑</text>
    <text x="1080" y="115" class="box-desc">低成本日常对话模型 + 深度逻辑推理模型</text>
    <text x="1080" y="138" class="box-desc" fill="#0284c7" style="font-weight: 700;">🔮 模型路由与高并发请求缓存</text>
  </g>

  <!-- ==================== LAYER 3: TRANSLATOR ==================== -->
  <g transform="translate(0, 700)">
    <rect x="580" y="0" width="440" height="65" rx="16" fill="#fffaf5" stroke="#fbcfe8" stroke-width="1.5" filter="url(#cozyShadow)"/>
    <text x="615" y="28" class="box-label">🔌 家庭系统适配器 (Service Adapter)</text>
    <text x="615" y="48" class="box-desc">把不同 Docker 系统的 API 统一翻译成 AI 听得懂的底层工具</text>
  </g>

  <!-- ==================== LAYER 4: SERVICES (The Servants) ==================== -->
  <g transform="translate(80, 810)">
    <rect x="0" y="0" width="1440" height="120" rx="20" fill="#fffcf9" stroke="#ebdccb" stroke-width="1.2" stroke-dasharray="4 4" filter="url(#softShadow)"/>
    <text class="layer-title" x="30" y="-12">CAPABILITIES · 在内网安静照顾生活的微服务群 (Docker &amp; VM)</text>

    <!-- Donetick -->
    <rect x="40" y="24" width="170" height="75" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="65" y="50" class="box-label">📅 家务与任务</text>
    <text x="65" y="72" class="box-desc">Donetick 计划机</text>

    <!-- Grocy -->
    <rect x="235" y="24" width="170" height="75" rx="16" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="260" y="50" class="box-label">🥦 物资与冰箱</text>
    <text x="260" y="72" class="box-desc">Grocy 自动库存</text>

    <!-- Bookkeeping -->
    <rect x="430" y="24" width="170" height="75" rx="16" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="455" y="50" class="box-label">💰 温馨家庭账本</text>
    <text x="455" y="72" class="box-desc">ezBookkeeping</text>

    <!-- Assets -->
    <rect x="625" y="24" width="170" height="75" rx="16" fill="#fff5f5" stroke="#fbcfe8" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="650" y="50" class="box-label">👕 物品衣物整理</text>
    <text x="650" y="72" class="box-desc">Homebox 空间归档</text>

    <!-- Media -->
    <rect x="820" y="24" width="170" height="75" rx="16" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="845" y="50" class="box-label">🖼️ 独属于家的回忆</text>
    <text x="845" y="72" class="box-desc">Immich / Nav</text>

    <!-- Health -->
    <rect x="1015" y="24" width="170" height="75" rx="16" fill="#fff1f2" stroke="#fda4af" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="1040" y="50" class="box-label">❤️ 身体节律经期</text>
    <text x="1040" y="72" class="box-desc">女性健康关怀时间线</text>

    <!-- HA -->
    <rect x="1210" y="24" width="190" height="75" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="1235" y="50" class="box-label">🏡 智能家居 HA</text>
    <text x="1235" y="72" class="box-desc">虚拟机中枢 (灯与门锁)</text>
  </g>

  <!-- ==================== LAYER 5: STORAGE & DATA EVOLUTION ==================== -->
  <g transform="translate(80, 975)">
    <!-- PostgreSQL -->
    <rect x="250" y="0" width="340" height="52" rx="15" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="290" y="32" class="box-label">💾 PostgreSQL 家庭长效记忆数据库</text>

    <!-- Personal model prediction -->
    <rect x="840" y="0" width="460" height="52" rx="15" fill="#fff1f2" stroke="#fbcfe8" stroke-width="1.2" filter="url(#cozyShadow)"/>
    <text x="865" y="32" class="box-label">🔮 长期数据积累后的身体节律预测模型</text>
  </g>

  <!-- ==================== FLOWS & CONNECTIONS (Zero messy crossing) ==================== -->

  <!-- 1. From touchpoints converging and going down to Traefik -->
  <path class="flow-line" d="M340 252 L340 285 L550 285 L550 315"/>
  <path class="bus-line" d="M800 252 L800 285 L550 285"/>
  <path class="bus-line" d="M1260 252 L1260 285 L550 285"/>

  <!-- 2. From Traefik to AI Assistant Gateway -->
  <path class="flow-line" d="M680 355 L920 355"/>

  <!-- 3. From Gateway to Hermes -->
  <path class="flow-line" d="M1050 395 L1050 422 L300 422 L300 480"/>

  <!-- 4. Inside Brain Complex (Neat horizontal exchanges) -->
  <!-- Hermes <-> Skill Registry -->
  <path class="flow-dashed" d="M470 520 L630 520"/>
  <path class="flow-dashed" d="M630 555 L470 555"/>
  <!-- Hermes to LiteLLM (Beautiful non-intersecting curve in empty corridor above Skill Registry) -->
  <path class="flow-line" d="M470 500 C600 460 1000 460 1130 500"/>

  <!-- 5. From Skills Registry down to Service Translator -->
  <path class="flow-line" d="M800 620 L800 700"/>

  <!-- 6. FROM ADAPTER DOWN TO SERVICES BUS (Horizontal elegant single-bus layout) -->
  <path class="flow-line" d="M800 765 L800 822"/> <!-- Drop down to horizontal bus -->
  <path class="bus-line" d="M205 822 L1385 822"/> <!-- Horizontal distribution bus inside the CAPABILITIES border gap -->

  <!-- Dropping vertical, straight perpendicular lines down to individual services -->
  <path class="flow-line" d="M205 822 L205 834"/> <!-- Donetick -->
  <path class="flow-line" d="M400 822 L400 834"/> <!-- Grocy -->
  <path class="flow-line" d="M595 822 L595 834"/> <!-- ezBookkeeping -->
  <path class="flow-line" d="M790 822 L790 834"/> <!-- Homebox -->
  <path class="flow-line" d="M985 822 L985 834"/> <!-- Immich -->
  <path class="flow-line" d="M1180 822 L1180 834"/> <!-- Health -->
  <path class="flow-line" d="M1385 822 L1385 834"/> <!-- HA -->

  <!-- 7. Bottom DB writes (In the corridors, zero box crossing) -->
  <!-- Books writes to PostgreSQL -->
  <path class="flow-dashed" d="M595 909 L595 940 L500 940 L500 975"/>
  <!-- Health writes to Predictor -->
  <path class="flow-dashed" d="M1180 909 L1180 940 L1100 940 L1100 975"/>

  <!-- 8. From PostgreSQL (right boundary 670) to Predictor (left boundary 920) -->
  <path class="flow-dashed" d="M670 1001 L920 1001"/>

  <!-- 9. Evolutionary Loop back to Skills Registry (Offline logs analysis) -->
  <!-- Sweeps from Predictor right side (x=1380, center-y=1001) around right margin (outer bounds) to Skill Registry right edge (x=970, y=550) -->
  <path class="flow-dashed" d="M1380 1001 C1540 1001 1540 550 970 550"/>

  <!-- Footnote -->
  <g transform="translate(80, 1055)">
    <text x="720" y="0" text-anchor="middle" class="footer-text">“一宿一物，一饭一茶。代码是刻在光格里的默契，在不被打扰的地方，默默陪伴这个家长大。” | 隐私第一 ∙ 温暖智巧 ∙ 自然演进</text>
  </g>
</svg>
