# ============================================================
# Home Database — PostgreSQL + Redis + PgBouncer
# 内网独立数据库服务，不依赖任何 Docker 网络
# ============================================================

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-home}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
      FIREFLY_DB_PASSWORD: ${FIREFLY_DB_PASSWORD}
      MEALIE_DB_PASSWORD: ${MEALIE_DB_PASSWORD}
      LUBELOGGER_DB_PASSWORD: ${LUBELOGGER_DB_PASSWORD}
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD}
      HOMEASSISTANT_DB_PASSWORD: ${HA_DB_PASSWORD}
      NEXT_TERMINAL_DB_PASSWORD: ${NEXT_TERMINAL_DB_PASSWORD}
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
    volumes:
      - /share/Container/postgres/data:/var/lib/postgresql/data
      - /share/File/project/AiJiaS/database/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8.6-alpine
    container_name: redis
    restart: unless-stopped
    network_mode: host
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - /share/Container/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    restart: unless-stopped
    network_mode: host
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: 127.0.0.1
      DB_NAME: ${POSTGRES_DB:-postgres}
      LISTEN_PORT: 6432
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 100
      IDLE_TIMEOUT: 600
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
