id: food.inventory_and_recipe
name: 食材库存与菜谱建议
version: 1.0.0
status: approved
owner: family
risk_level: low
service_adapter:
  service: grocy-mealie
  action: query_inventory_and_suggest_recipe
trigger_examples:
  - 冰箱里还有什么快过期
  - 今天家里这些菜能做什么
  - 帮我查一下牛奶还有没有
input_schema:
  type: object
  required: []
  properties:
    ingredients:
      type: array
      items:
        type: string
    include_expiring:
      type: boolean
      default: true
    meal_type:
      type: string
confirmation:
  required: false
  reason: 默认只读取库存和菜谱；如果要写入库存，由 adapter 升级为 medium 风险并要求确认。
audit:
  log_request: true
  log_response: true
  redact_fields: []
tests:
  - name: expiring_foods
    input:
      include_expiring: true
    expect:
      status: success
