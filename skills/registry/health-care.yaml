id: health.period_care
name: 经期与健康关怀
version: 1.0.0
status: approved
owner: family
risk_level: high
service_adapter:
  service: period-predictor
  action: predict_and_plan_care
trigger_examples:
  - 帮我看看下次生理期大概什么时候
  - 这几天痛经风险高吗
  - 提醒我经期前准备热敷和茶饮
input_schema:
  type: object
  required: []
  properties:
    last_period_start:
      type: string
      format: date
    symptoms:
      type: array
      items:
        type: string
    pain_score:
      type: number
      minimum: 0
      maximum: 10
    sleep_hours:
      type: number
    basal_body_temperature:
      type: number
confirmation:
  required: true
  reason: 健康相关建议必须以提醒和记录为主，不能替代医生诊断。
audit:
  log_request: true
  log_response: true
  redact_fields:
    - symptoms
    - notes
safety_red_lines:
  - 剧烈疼痛
  - 异常出血
  - 怀孕期间腹痛或出血
  - 发热、晕厥或持续呕吐
tests:
  - name: period_prediction
    input:
      last_period_start: "2026-06-01"
      pain_score: 3
    expect:
      status: pending_confirmation
