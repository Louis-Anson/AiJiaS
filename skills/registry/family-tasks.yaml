# 家务任务 — 通过 Donetick 创建/管理家庭任务
# Donetick 以任务（task/chore）为核心，支持定时、循环、分配
# Donetick API: POST/GET /api/v1/tasks

skills:
  - id: chores.create_task
    name: 创建家务任务
    service: donetick
    action: create_task
    description: 创建新任务，支持定时、循环、分配给家庭成员
    risk: medium
    input:
      title: "string*"
      description: string
      due_date: datetime
      recurrence: string
      assignee: string
      priority: string
    confirm: 需确认任务内容、执行人和时间
    redlines: []

  - id: chores.list_tasks
    name: 查看任务
    service: donetick
    action: list_tasks
    description: 查看待办、已完成、逾期任务
    risk: low
    input:
      status: "string [pending]"
      assignee: string
      due_before: date
    confirm: false
    redlines: []
